name: NFG Tailscale Helper
slug: nfg_tailscale_helper
version: "1.0.3"
description: NextForGen hub provisioning Tailscale apply (Plan K)
arch:
  - aarch64
  - amd64
image: ghcr.io/ugurkayatc/nfg-tailscale-helper-{arch}
url: https://github.com/UgurKayatc/AkilliEv
host_network: true
privileged:
  - NET_ADMIN
  - NET_RAW
devices:
  - /dev/net/tun
map:
  - addon_config:rw
  # /share — HAOS addon'lar arası paylaşılan volume.
  # auth_failed marker (/share/.nfg-auth-failed) NFG Agent ile koordinasyon için kullanılır.
  - share:rw
options:
  authkey: ""
  hostname: ""
  advertise_tags:
    - "tag:nfg-provisioning"
  accept_dns: true
  accept_routes: true
  log_level: info
schema:
  authkey: password?
  hostname: str?
  advertise_tags:
    - match(^tag:[a-z0-9-]+$)
  accept_dns: bool
  accept_routes: bool
  log_level: list(trace|debug|info|notice|warning|error|fatal)
startup: services
boot: auto
