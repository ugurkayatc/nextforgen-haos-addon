name: "NextForGen Agent"
description: "NextForGen akÄ±llÄ± ev platformu hub baÄŸlantÄ± ajanÄ±. CihazlarÄ±nÄ±zÄ± NextForGen uygulamasÄ±ndan yÃ¶netmenizi saÄŸlar."
version: "1.1.19"
slug: "nextforgen_agent"
url: "https://nextforgen.com"
arch:
  - aarch64
init: false

# HAOS API erişimleri
hassio_api: true
homeassistant_api: true
# auth_api: v1.1.19 itibariyle aktif kullanılmıyor (HA admin reset akışı kaldırıldı).
auth_api: true
# hassio_role: admin — /host/options için zorunlu (hostname swap, Bölüm 9.6 firstboot).
hassio_role: admin

# AÄŸ yapÄ±landÄ±rmasÄ±
host_network: false
ports:
  9100/tcp: 9100
ports_description:
  9100/tcp: "LAN fallback HTTPS endpoint (mobil lokal baÄŸlantÄ±)"

# KalÄ±cÄ± depolama
map:
  - addon_config:rw

# KullanÄ±cÄ± yapÄ±landÄ±rma ÅŸemasÄ±
# pairing_code + pre_shared_secret â€” teknisyen HAOS Configuration sekmesinden yapÄ±ÅŸtÄ±rÄ±r.
# Finalize sonrasÄ± Agent kendisi temizler (ProvisioningPollService B3).
options:
  backend_url: "wss://api.nextforgen.com/hub"
  bootstrap_code: ""
  pairing_code: ""
  pre_shared_secret: ""
  nfg_tailscale_helper_slug: "f43b29bd_nfg_tailscale_helper"
  log_level: "info"
  dev_mode: false

schema:
  backend_url: url
  bootstrap_code: str
  pairing_code: str?
  pre_shared_secret: password?
  nfg_tailscale_helper_slug: str
  log_level: list(trace|debug|info|warning|error)
  dev_mode: bool

# Docker image (GitHub Container Registry)
image: "ghcr.io/ugurkayatc/agent"

# Servis boot sonrasÄ± kendiliÄŸinden baÅŸlasÄ±n
startup: services
boot: auto

# Watchdog â€” agent crash'lerse yeniden baÅŸlat
watchdog: "tcp://[HOST]:9100"
