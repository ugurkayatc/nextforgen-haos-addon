name: "NextForGen Agent (Canary)"
description: "NextForGen akıllı ev platformu hub ajanı — KANARY KANAL. Bu eklenti sadece NextForGen iç test hub'larında çalışır. Yeni sürümler önce burada doğrulanır, sonra stable kanala yayılır. Müşteri hub'larına KURMAYIN."
version: "1.1.5"
slug: "nextforgen_agent_canary"
url: "https://nextforgen.com"
arch:
  - aarch64
init: false

# HAOS API erişimleri
hassio_api: true
homeassistant_api: true
auth_api: false

# Ağ yapılandırması
host_network: false
ports:
  9100/tcp: 9100
ports_description:
  9100/tcp: "LAN fallback HTTPS endpoint (mobil lokal bağlantı)"

# Kalıcı depolama
map:
  - addon_config:rw

# Kullanıcı yapılandırma şeması
options:
  backend_url: "wss://api.nextforgen.com/hub"
  bootstrap_code: ""
  log_level: "info"
  dev_mode: false

schema:
  backend_url: url
  bootstrap_code: str
  log_level: list(trace|debug|info|warning|error)
  dev_mode: bool

# Docker image — canary kanal aynı GHCR image'ı kullanır.
# Versiyon bump zincirleme: önce canary config.yaml + image push, 24h test, sonra stable config.yaml.
image: "ghcr.io/ugurkayatc/agent"

# Servis boot sonrası kendiliğinden başlasın
startup: services
boot: auto

# Watchdog — agent crash'lerse yeniden başlat
watchdog: "tcp://[HOST]:9100"
