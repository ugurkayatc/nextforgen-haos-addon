name: "NextForGen Agent (Canary)"
description: "NextForGen akilli ev platformu hub ajani - KANARY KANAL. Bu eklenti sadece NextForGen ic test hub'larinda calisir. Yeni surumler once burada dogrulanir, sonra stable kanala yayilir. Musteri hub'larina KURMAYIN."
version: "1.1.7"
slug: "nextforgen_agent_canary"
url: "https://nextforgen.com"
arch:
  - aarch64
init: false

hassio_api: true
homeassistant_api: true
auth_api: false

host_network: false
ports:
  9100/tcp: 9100
ports_description:
  9100/tcp: "LAN fallback HTTPS endpoint"

map:
  - addon_config:rw

options:
  backend_url: "wss://api.nextforgen.com/hub"
  bootstrap_code: ""
  log_level: "info"
  dev_mode: false

schema:
  backend_url: url
  bootstrap_code: str
  log_level: list(trace|debug|info|warning|error)
  dev_mode: bool

image: "ghcr.io/ugurkayatc/agent"

startup: services
boot: auto

watchdog: "tcp://[HOST]:9100"
